<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake Game - Valley of AI</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --grid: #334155;
      --snake-head: #22c55e;
      --snake-body: #16a34a;
      --food: #ef4444;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --grid: #e2e8f0;
        --text: #1e293b;
        --text-muted: #64748b;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
      touch-action: none;
    }

    .container {
      text-align: center;
      max-width: 100%;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .game-container {
      position: relative;
      display: inline-block;
      margin-bottom: 1rem;
    }

    canvas {
      display: block;
      background: var(--surface);
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 0.75rem;
      backdrop-filter: blur(4px);
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .overlay p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .final-score {
      font-size: 3rem;
      font-weight: 700;
      color: var(--snake-head);
      margin-bottom: 1rem;
    }

    button {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 9999px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
    }

    button:active {
      transform: scale(0.98);
    }

    .instructions {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 1rem;
    }

    .instructions kbd {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      background: var(--surface);
      border: 1px solid var(--grid);
      border-radius: 0.25rem;
      font-family: inherit;
      font-size: 0.75rem;
      margin: 0 0.125rem;
    }

    .badge {
      display: inline-block;
      background: var(--surface);
      color: var(--text-muted);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      margin-top: 1rem;
      border: 1px solid var(--grid);
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.25rem; }
      .stats { gap: 1.5rem; }
      .stat-value { font-size: 1.25rem; }
      .instructions { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐍 Snake Game</h1>
    
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">High Score</span>
        <span class="stat-value" id="highScore">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Level</span>
        <span class="stat-value" id="level">1</span>
      </div>
    </div>

    <div class="game-container">
      <canvas id="game"></canvas>
      
      <div class="overlay" id="startOverlay">
        <h2>🐍 Snake</h2>
        <p>Eat food to grow. Don't hit the walls or yourself!</p>
        <button id="startBtn">Play</button>
      </div>
      
      <div class="overlay hidden" id="gameOverOverlay">
        <h2>Game Over</h2>
        <div class="final-score" id="finalScore">0</div>
        <p>Press Space or tap to play again</p>
        <button id="restartBtn">Play Again</button>
      </div>
    </div>
    
    <p class="instructions">
      Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move. On mobile, swipe to change direction.
    </p>
    
    <span class="badge">Generated by AI</span>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // Responsive canvas size
    const GRID_SIZE = 20;
    let CELL_SIZE;
    let COLS;
    let ROWS;

    function resizeCanvas() {
      const maxSize = Math.min(window.innerWidth - 32, window.innerHeight - 280, 400);
      const size = Math.floor(maxSize / GRID_SIZE) * GRID_SIZE;
      canvas.width = size;
      canvas.height = size;
      CELL_SIZE = size / GRID_SIZE;
      COLS = GRID_SIZE;
      ROWS = GRID_SIZE;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Game state
    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 0, y: 0 };
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
    let level = 1;
    let gameLoop = null;
    let gameRunning = false;

    // DOM elements
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const levelEl = document.getElementById('level');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScoreEl = document.getElementById('finalScore');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    highScoreEl.textContent = highScore;

    function initGame() {
      snake = [
        { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
        { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
        { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) },
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      level = 1;
      scoreEl.textContent = score;
      levelEl.textContent = level;
      spawnFood();
    }

    function spawnFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
      } while (snake.some(seg => seg.x === newFood.x && seg.y === newFood.y));
      food = newFood;
    }

    function update() {
      direction = nextDirection;
      
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y,
      };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        gameOver();
        return;
      }

      // Self collision
      if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score += 10 * level;
        scoreEl.textContent = score;
        
        // Level up every 50 points
        const newLevel = Math.floor(score / 50) + 1;
        if (newLevel > level) {
          level = newLevel;
          levelEl.textContent = level;
          // Increase speed
          clearInterval(gameLoop);
          gameLoop = setInterval(gameStep, Math.max(50, 150 - (level - 1) * 15));
        }
        
        spawnFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw grid
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--grid');
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, canvas.height);
        ctx.stroke();
      }
      for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(canvas.width, i * CELL_SIZE);
        ctx.stroke();
      }

      // Draw food
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--food');
      ctx.beginPath();
      ctx.arc(
        food.x * CELL_SIZE + CELL_SIZE / 2,
        food.y * CELL_SIZE + CELL_SIZE / 2,
        CELL_SIZE / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();

      // Draw snake
      snake.forEach((segment, index) => {
        const isHead = index === 0;
        ctx.fillStyle = isHead 
          ? getComputedStyle(document.documentElement).getPropertyValue('--snake-head')
          : getComputedStyle(document.documentElement).getPropertyValue('--snake-body');
        
        const padding = 1;
        const radius = isHead ? CELL_SIZE / 3 : CELL_SIZE / 4;
        
        // Rounded rectangle
        const x = segment.x * CELL_SIZE + padding;
        const y = segment.y * CELL_SIZE + padding;
        const w = CELL_SIZE - padding * 2;
        const h = CELL_SIZE - padding * 2;
        
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, radius);
        ctx.fill();

        // Draw eyes on head
        if (isHead) {
          ctx.fillStyle = '#ffffff';
          const eyeSize = CELL_SIZE / 8;
          const eyeOffset = CELL_SIZE / 5;
          
          let eye1, eye2;
          if (direction.x === 1) {
            eye1 = { x: x + w - eyeOffset, y: y + eyeOffset };
            eye2 = { x: x + w - eyeOffset, y: y + h - eyeOffset };
          } else if (direction.x === -1) {
            eye1 = { x: x + eyeOffset, y: y + eyeOffset };
            eye2 = { x: x + eyeOffset, y: y + h - eyeOffset };
          } else if (direction.y === -1) {
            eye1 = { x: x + eyeOffset, y: y + eyeOffset };
            eye2 = { x: x + w - eyeOffset, y: y + eyeOffset };
          } else {
            eye1 = { x: x + eyeOffset, y: y + h - eyeOffset };
            eye2 = { x: x + w - eyeOffset, y: y + h - eyeOffset };
          }
          
          ctx.beginPath();
          ctx.arc(eye1.x, eye1.y, eyeSize, 0, Math.PI * 2);
          ctx.arc(eye2.x, eye2.y, eyeSize, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function gameStep() {
      update();
      draw();
    }

    function startGame() {
      initGame();
      startOverlay.classList.add('hidden');
      gameOverOverlay.classList.add('hidden');
      gameRunning = true;
      draw();
      gameLoop = setInterval(gameStep, 150);
    }

    function gameOver() {
      gameRunning = false;
      clearInterval(gameLoop);
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreEl.textContent = highScore;
      }
      
      finalScoreEl.textContent = score;
      gameOverOverlay.classList.remove('hidden');
    }

    // Controls
    function setDirection(dx, dy) {
      // Prevent reversing directly
      if (direction.x === -dx && dx !== 0) return;
      if (direction.y === -dy && dy !== 0) return;
      nextDirection = { x: dx, y: dy };
    }

    document.addEventListener('keydown', (e) => {
      if (!gameRunning && (e.code === 'Space' || e.code === 'Enter')) {
        startGame();
        return;
      }

      switch (e.code) {
        case 'ArrowUp':
        case 'KeyW':
          e.preventDefault();
          setDirection(0, -1);
          break;
        case 'ArrowDown':
        case 'KeyS':
          e.preventDefault();
          setDirection(0, 1);
          break;
        case 'ArrowLeft':
        case 'KeyA':
          e.preventDefault();
          setDirection(-1, 0);
          break;
        case 'ArrowRight':
        case 'KeyD':
          e.preventDefault();
          setDirection(1, 0);
          break;
      }
    });

    // Touch controls
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
      if (!gameRunning) return;
      
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;
      
      const minSwipe = 30;
      if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? 1 : -1, 0);
      } else {
        setDirection(0, dy > 0 ? 1 : -1);
      }
    }, { passive: true });

    // Button handlers
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    // Initial draw
    initGame();
    draw();
  </script>
</body>
</html>
