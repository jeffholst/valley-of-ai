<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background (matches app's --bg: #ffffff) -->
  <rect width="800" height="450" fill="url(#bg-gradient)"/>
  
  <!-- Header -->
  <text x="400" y="40" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="28" font-weight="700" fill="#0f172a">🎨 Color Palette Generator</text>
  <text x="400" y="65" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="14" fill="#64748b">Create beautiful, harmonious color palettes for your designs</text>
  
  <!-- Controls Panel (matches app's --surface: #f1f5f9) -->
  <rect x="50" y="85" width="700" height="70" rx="16" fill="#f1f5f9" filter="url(#shadow)"/>
  
  <!-- Base Color Picker -->
  <text x="75" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Base Color</text>
  <rect x="75" y="120" width="80" height="24" rx="6" fill="#8b5cf6"/>
  
  <!-- Harmony Type Dropdown -->
  <text x="180" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Harmony Type</text>
  <rect x="180" y="118" width="130" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="195" y="137" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">Complementary</text>
  
  <!-- Colors Dropdown -->
  <text x="330" y="110" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Colors</text>
  <rect x="330" y="118" width="80" height="28" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="345" y="137" font-family="system-ui, sans-serif" font-size="13" fill="#0f172a">5 Colors</text>
  
  <!-- Generate Button (matches app's --primary: #8b5cf6) -->
  <rect x="550" y="115" width="100" height="32" rx="10" fill="#8b5cf6"/>
  <text x="600" y="136" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="13" font-weight="600" fill="white">🔄 Generate</text>
  
  <!-- Random Button -->
  <rect x="660" y="115" width="75" height="32" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
  <text x="698" y="136" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="13" font-weight="600" fill="#0f172a">🎲</text>
  
  <!-- Palette Container -->
  <rect x="50" y="175" width="700" height="230" rx="16" fill="#f1f5f9" filter="url(#shadow)"/>
  
  <!-- Harmony Badge -->
  <rect x="65" y="188" width="120" height="24" rx="12" fill="#8b5cf6"/>
  <text x="125" y="204" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="11" font-weight="600" fill="white">🔄 Complementary</text>
  
  <!-- Color Card 1 - Base color (purple) -->
  <g filter="url(#shadow)">
    <rect x="65" y="225" width="125" height="155" rx="12" fill="#ffffff"/>
    <rect x="65" y="225" width="125" height="85" rx="12" fill="#8b5cf6"/>
    <rect x="65" y="290" width="125" height="90" rx="0 0 12 12" fill="#ffffff"/>
    <text x="127" y="275" text-anchor="middle" font-family="system-ui, sans-serif" 
          font-size="24" fill="white" opacity="0.7">1</text>
    <text x="77" y="320" font-family="SF Mono, Monaco, monospace" font-size="14" font-weight="600" fill="#0f172a">#8B5CF6</text>
    <text x="77" y="338" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">purple</text>
    <text x="77" y="356" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">rgb(139, 92, 246)</text>
    <text x="77" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">hsl(262°, 90%, 66%)</text>
  </g>
  
  <!-- Color Card 2 - Complement (yellow-green) -->
  <g filter="url(#shadow)">
    <rect x="200" y="225" width="125" height="155" rx="12" fill="#ffffff"/>
    <rect x="200" y="225" width="125" height="85" rx="12" fill="#5cf68b"/>
    <rect x="200" y="290" width="125" height="90" rx="0 0 12 12" fill="#ffffff"/>
    <text x="262" y="275" text-anchor="middle" font-family="system-ui, sans-serif" 
          font-size="24" fill="white" opacity="0.7">2</text>
    <text x="212" y="320" font-family="SF Mono, Monaco, monospace" font-size="14" font-weight="600" fill="#0f172a">#5CF68B</text>
    <text x="212" y="338" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">green</text>
    <text x="212" y="356" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">rgb(92, 246, 139)</text>
    <text x="212" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">hsl(142°, 90%, 66%)</text>
  </g>
  
  <!-- Color Card 3 - Variation (lighter purple) -->
  <g filter="url(#shadow)">
    <rect x="335" y="225" width="125" height="155" rx="12" fill="#ffffff"/>
    <rect x="335" y="225" width="125" height="85" rx="12" fill="#a78bfa"/>
    <rect x="335" y="290" width="125" height="90" rx="0 0 12 12" fill="#ffffff"/>
    <text x="397" y="275" text-anchor="middle" font-family="system-ui, sans-serif" 
          font-size="24" fill="white" opacity="0.7">3</text>
    <text x="347" y="320" font-family="SF Mono, Monaco, monospace" font-size="14" font-weight="600" fill="#0f172a">#A78BFA</text>
    <text x="347" y="338" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">purple</text>
    <text x="347" y="356" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">rgb(167, 139, 250)</text>
    <text x="347" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">hsl(255°, 92%, 76%)</text>
  </g>
  
  <!-- Color Card 4 - Variation (teal) -->
  <g filter="url(#shadow)">
    <rect x="470" y="225" width="125" height="155" rx="12" fill="#ffffff"/>
    <rect x="470" y="225" width="125" height="85" rx="12" fill="#8bfac8"/>
    <rect x="470" y="290" width="125" height="90" rx="0 0 12 12" fill="#ffffff"/>
    <text x="532" y="275" text-anchor="middle" font-family="system-ui, sans-serif" 
          font-size="24" fill="white" opacity="0.7">4</text>
    <text x="482" y="320" font-family="SF Mono, Monaco, monospace" font-size="14" font-weight="600" fill="#0f172a">#8BFAC8</text>
    <text x="482" y="338" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">green</text>
    <text x="482" y="356" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">rgb(139, 250, 200)</text>
    <text x="482" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">hsl(153°, 90%, 76%)</text>
  </g>
  
  <!-- Color Card 5 - Variation (light lavender) -->
  <g filter="url(#shadow)">
    <rect x="605" y="225" width="125" height="155" rx="12" fill="#ffffff"/>
    <rect x="605" y="225" width="125" height="85" rx="12" fill="#c4b5fd"/>
    <rect x="605" y="290" width="125" height="90" rx="0 0 12 12" fill="#ffffff"/>
    <text x="667" y="275" text-anchor="middle" font-family="system-ui, sans-serif" 
          font-size="24" fill="rgba(0,0,0,0.4)" opacity="0.7">5</text>
    <text x="617" y="320" font-family="SF Mono, Monaco, monospace" font-size="14" font-weight="600" fill="#0f172a">#C4B5FD</text>
    <text x="617" y="338" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">purple</text>
    <text x="617" y="356" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">rgb(196, 181, 253)</text>
    <text x="617" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">hsl(253°, 94%, 85%)</text>
  </g>
  
  <!-- Export buttons row -->
  <rect x="65" y="392" width="75" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="102" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Export CSS</text>
  
  <rect x="150" y="392" width="85" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="192" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Export Tailwind</text>
  
  <rect x="245" y="392" width="80" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="285" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Export SCSS</text>
  
  <rect x="335" y="392" width="78" height="28" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <text x="374" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0f172a">Export JSON</text>
</svg>
