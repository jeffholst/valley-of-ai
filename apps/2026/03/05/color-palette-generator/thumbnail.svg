<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="120" fill="#8b5cf6" opacity="0.1"/>
  <circle cx="700" cy="380" r="150" fill="#ec4899" opacity="0.1"/>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="32" font-weight="700" fill="#ffffff">🎨 Color Palette Generator</text>
  <text x="400" y="80" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="14" fill="#a5b4fc">Create beautiful, harmonious color palettes</text>
  
  <!-- Main palette display - 5 color swatches -->
  <g filter="url(#card-shadow)">
    <!-- Color 1 - Deep Purple -->
    <rect x="80" y="120" width="120" height="280" rx="16" fill="#8b5cf6"/>
    <text x="140" y="370" text-anchor="middle" font-family="SF Mono, monospace" 
          font-size="12" font-weight="600" fill="white" opacity="0.9">#8B5CF6</text>
    
    <!-- Color 2 - Pink -->
    <rect x="210" y="120" width="120" height="280" rx="16" fill="#ec4899"/>
    <text x="270" y="370" text-anchor="middle" font-family="SF Mono, monospace" 
          font-size="12" font-weight="600" fill="white" opacity="0.9">#EC4899</text>
    
    <!-- Color 3 - Coral -->
    <rect x="340" y="120" width="120" height="280" rx="16" fill="#f97316"/>
    <text x="400" y="370" text-anchor="middle" font-family="SF Mono, monospace" 
          font-size="12" font-weight="600" fill="white" opacity="0.9">#F97316</text>
    
    <!-- Color 4 - Yellow -->
    <rect x="470" y="120" width="120" height="280" rx="16" fill="#eab308"/>
    <text x="530" y="370" text-anchor="middle" font-family="SF Mono, monospace" 
          font-size="12" font-weight="600" fill="#1e1b4b" opacity="0.9">#EAB308</text>
    
    <!-- Color 5 - Teal -->
    <rect x="600" y="120" width="120" height="280" rx="16" fill="#14b8a6"/>
    <text x="660" y="370" text-anchor="middle" font-family="SF Mono, monospace" 
          font-size="12" font-weight="600" fill="white" opacity="0.9">#14B8A6</text>
  </g>
  
  <!-- Harmony badge -->
  <rect x="320" y="415" width="160" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="400" y="434" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="12" font-weight="600" fill="#ffffff">✨ Analogous Harmony</text>
</svg>
