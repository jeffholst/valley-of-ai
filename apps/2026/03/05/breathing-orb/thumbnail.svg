<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2340"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="orb" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.33" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#7c9cff"/>
    </radialGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <rect x="180" y="40" width="440" height="370" rx="24" fill="#121a31" stroke="#9fb0de" stroke-opacity="0.25"/>
  <text x="210" y="82" font-family="system-ui, sans-serif" font-size="30" font-weight="700" fill="#e7ecff">🫧 Breathing Orb</text>
  <text x="210" y="108" font-family="system-ui, sans-serif" font-size="15" fill="#9fb0de">A tiny calm-space for your nervous system.</text>

  <circle cx="400" cy="222" r="96" fill="#67e8f9" fill-opacity="0.24" filter="url(#blur)"/>
  <circle cx="400" cy="222" r="74" fill="url(#orb)"/>

  <text x="400" y="327" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" letter-spacing="3" fill="#9fb0de">INHALE</text>
  <text x="400" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="44" font-weight="700" fill="#e7ecff">01:14</text>

  <rect x="270" y="374" width="124" height="28" rx="14" fill="#7c9cff"/>
  <text x="332" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="white">Running…</text>
  <rect x="406" y="374" width="96" height="28" rx="14" fill="#9fb0de" fill-opacity="0.25"/>
  <text x="454" y="393" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#e7ecff">Reset</text>
</svg>
