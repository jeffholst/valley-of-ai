<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathing Orb - Valley of AI</title>
  <meta name="description" content="A calming guided breathing app with animated orb and configurable inhale/exhale rhythm." />
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #1a2340;
      --surface: #121a31;
      --text: #e7ecff;
      --muted: #9fb0de;
      --primary: #7c9cff;
      --accent: #67e8f9;
      --good: #7ef0b0;
      --shadow: rgba(0, 0, 0, 0.35);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f1f4ff;
        --bg2: #dde6ff;
        --surface: #ffffff;
        --text: #192445;
        --muted: #50608f;
        --primary: #3657d6;
        --accent: #0ea5e9;
        --good: #0f766e;
        --shadow: rgba(32, 53, 112, 0.18);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 700px at 20% 20%, var(--bg2), var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .app {
      width: min(540px, 100%);
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      border: 1px solid color-mix(in srgb, var(--muted) 25%, transparent);
      border-radius: 24px;
      box-shadow: 0 18px 50px var(--shadow);
      padding: 22px;
      backdrop-filter: blur(8px);
    }
    h1 { margin: 0 0 6px; font-size: 1.5rem; }
    .sub { margin: 0 0 16px; color: var(--muted); font-size: .95rem; }
    .center {
      display: grid;
      place-items: center;
      margin: 10px 0 16px;
      min-height: 260px;
    }
    .orb {
      width: 160px;
      height: 160px;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 30%, #fff8, transparent 35%), linear-gradient(145deg, var(--primary), var(--accent));
      box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 40%, transparent), 0 14px 30px var(--shadow);
      transform: scale(1);
      transition: transform 200ms linear;
    }
    .label {
      margin-top: 16px;
      font-size: 1.05rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .timer { font-size: 2.1rem; font-weight: 700; margin-top: 3px; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .row { display: grid; gap: 6px; }
    label { font-size: .85rem; color: var(--muted); }
    input {
      width: 100%;
      border: 1px solid color-mix(in srgb, var(--muted) 35%, transparent);
      border-radius: 12px;
      padding: 10px;
      background: transparent;
      color: var(--text);
      font-size: 1rem;
    }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, filter .2s ease;
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.06); }
    .primary { background: var(--primary); color: #fff; flex: 1; }
    .ghost { background: color-mix(in srgb, var(--muted) 20%, transparent); color: var(--text); }
    .done { margin-top: 10px; color: var(--good); min-height: 1.1em; }
    @media (max-width: 560px) {
      .controls { grid-template-columns: 1fr; }
      .orb { width: 140px; height: 140px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .orb { transition: none; }
      * { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="app" aria-live="polite">
    <h1>🫧 Breathing Orb</h1>
    <p class="sub">A tiny calm-space for your nervous system.</p>

    <section class="center">
      <div class="orb" id="orb" role="img" aria-label="Animated breathing orb"></div>
      <div class="label" id="phaseLabel">Ready</div>
      <div class="timer" id="timer">00:00</div>
    </section>

    <section class="controls">
      <div class="row">
        <label for="inhale">Inhale seconds</label>
        <input id="inhale" type="number" min="2" max="12" value="4" />
      </div>
      <div class="row">
        <label for="exhale">Exhale seconds</label>
        <input id="exhale" type="number" min="2" max="14" value="6" />
      </div>
    </section>

    <div class="actions">
      <button id="start" class="primary">Start Session</button>
      <button id="reset" class="ghost">Reset</button>
    </div>
    <p class="done" id="done"></p>
  </main>

  <script>
    const orb = document.getElementById('orb');
    const phaseLabel = document.getElementById('phaseLabel');
    const timer = document.getElementById('timer');
    const done = document.getElementById('done');
    const inhaleInput = document.getElementById('inhale');
    const exhaleInput = document.getElementById('exhale');
    const startBtn = document.getElementById('start');
    const resetBtn = document.getElementById('reset');

    let running = false;
    let raf = null;
    let start = 0;
    const durationSec = 120;

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function fmt(total) {
      const m = Math.floor(total / 60).toString().padStart(2, '0');
      const s = Math.floor(total % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function tick(ts) {
      if (!running) return;
      if (!start) start = ts;

      const elapsed = (ts - start) / 1000;
      const left = Math.max(0, durationSec - elapsed);
      timer.textContent = fmt(left);

      const inhale = clamp(Number(inhaleInput.value || 4), 2, 12);
      const exhale = clamp(Number(exhaleInput.value || 6), 2, 14);
      const cycle = inhale + exhale;
      const inCycle = elapsed % cycle;
      const inhalePhase = inCycle < inhale;

      if (inhalePhase) {
        const p = inCycle / inhale;
        orb.style.transform = `scale(${1 + p * 0.34})`;
        phaseLabel.textContent = 'Inhale';
      } else {
        const p = (inCycle - inhale) / exhale;
        orb.style.transform = `scale(${1.34 - p * 0.34})`;
        phaseLabel.textContent = 'Exhale';
      }

      const pulse = 12 + Math.sin(elapsed * 2) * 4;
      orb.style.boxShadow = `0 0 0 ${pulse}px color-mix(in srgb, var(--accent) 24%, transparent), 0 14px 30px var(--shadow)`;

      if (left <= 0) {
        running = false;
        done.textContent = 'Session complete. Nice work 🌿';
        startBtn.textContent = 'Start Again';
        return;
      }

      raf = requestAnimationFrame(tick);
    }

    startBtn.addEventListener('click', () => {
      if (running) return;
      done.textContent = '';
      running = true;
      start = 0;
      startBtn.textContent = 'Running…';
      raf = requestAnimationFrame(tick);
    });

    resetBtn.addEventListener('click', () => {
      running = false;
      cancelAnimationFrame(raf);
      orb.style.transform = 'scale(1)';
      phaseLabel.textContent = 'Ready';
      timer.textContent = '02:00';
      done.textContent = '';
      startBtn.textContent = 'Start Session';
    });

    timer.textContent = '02:00';
  </script>
</body>
</html>
