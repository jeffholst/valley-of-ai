<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example App - Valley of AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      text-align: center;
    }
    h1 {
      color: #1f2937;
      margin-bottom: 16px;
      font-size: 2rem;
    }
    p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .counter {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .count {
      font-size: 3rem;
      font-weight: bold;
      color: #667eea;
      min-width: 80px;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1.25rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(102, 126, 234, 0.5);
    }
    button:active {
      transform: translateY(0);
    }
    .badge {
      display: inline-block;
      background: #f3f4f6;
      color: #667eea;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 Example App</h1>
    <p>This is a demonstration app generated by AI to showcase the Valley of AI gallery system.</p>
    <div class="counter">
      <button onclick="decrement()">−</button>
      <span class="count" id="count">0</span>
      <button onclick="increment()">+</button>
    </div>
    <p>Click the buttons to interact with this simple counter.</p>
    <span class="badge">Generated by AI</span>
  </div>
  <script>
    let count = 0;
    const countEl = document.getElementById('count');
    
    function increment() {
      count++;
      countEl.textContent = count;
    }
    
    function decrement() {
      count--;
      countEl.textContent = count;
    }
  </script>
</body>
</html>
