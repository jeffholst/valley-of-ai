<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background (matches app's gradient) -->
  <rect width="800" height="450" fill="url(#bg-gradient)"/>
  
  <!-- White Card Container -->
  <rect x="200" y="75" width="400" height="300" rx="16" fill="white" filter="url(#card-shadow)"/>
  
  <!-- Title -->
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="32" font-weight="700" fill="#1f2937">🎉 Example App</text>
  
  <!-- Description -->
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="14" fill="#6b7280">A demonstration app for the Valley of AI</text>
  
  <!-- Counter Section -->
  <!-- Minus Button -->
  <rect x="250" y="200" width="60" height="60" rx="8" fill="url(#bg-gradient)"/>
  <text x="280" y="242" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="32" font-weight="500" fill="white">−</text>
  
  <!-- Count Display -->
  <text x="400" y="248" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="56" font-weight="700" fill="#667eea">42</text>
  
  <!-- Plus Button -->
  <rect x="490" y="200" width="60" height="60" rx="8" fill="url(#bg-gradient)"/>
  <text x="520" y="242" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="32" font-weight="500" fill="white">+</text>
  
  <!-- Helper Text -->
  <text x="400" y="295" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="13" fill="#6b7280">Click the buttons to interact</text>
  
  <!-- Badge -->
  <rect x="325" y="320" width="150" height="28" rx="14" fill="#f3f4f6"/>
  <text x="400" y="340" text-anchor="middle" font-family="system-ui, sans-serif" 
        font-size="12" font-weight="500" fill="#667eea">Generated by AI</text>
</svg>
