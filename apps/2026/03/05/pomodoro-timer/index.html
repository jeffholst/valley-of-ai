<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer - Valley of AI</title>
  <style>
    :root {
      --primary: #ef4444;
      --primary-light: #fca5a5;
      --break: #22c55e;
      --break-light: #86efac;
      --bg: #ffffff;
      --surface: #f9fafb;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --ring-bg: #e5e7eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #334155;
        --ring-bg: #334155;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      transition: background-color 0.3s;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .mode-indicator {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .timer-ring {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 2rem;
    }

    .timer-ring svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .timer-ring circle {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
    }

    .timer-ring .bg {
      stroke: var(--ring-bg);
    }

    .timer-ring .progress {
      stroke: var(--primary);
      transition: stroke-dashoffset 0.5s ease, stroke 0.3s;
    }

    .timer-ring.break .progress {
      stroke: var(--break);
    }

    .timer-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .time {
      font-size: 4rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .session-count {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    button {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 9999px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      padding: 0.875rem 2.5rem;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: scale(1.02);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      padding: 0.875rem 1.5rem;
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-icon {
      background: var(--surface);
      color: var(--text-muted);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }

    .btn-icon:hover {
      color: var(--text);
      background: var(--border);
    }

    .settings {
      background: var(--surface);
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
      display: none;
    }

    .settings.open {
      display: block;
    }

    .settings h2 {
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-row label {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .setting-row input {
      width: 80px;
      padding: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      text-align: center;
    }

    .setting-row input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .badge {
      display: inline-block;
      background: var(--surface);
      color: var(--text-muted);
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      margin-top: 2rem;
      border: 1px solid var(--border);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍅 Pomodoro Timer</h1>
    <p class="mode-indicator" id="modeIndicator">Focus Time</p>

    <div class="timer-ring" id="timerRing">
      <svg viewBox="0 0 280 280">
        <circle class="bg" cx="140" cy="140" r="130"></circle>
        <circle class="progress" id="progressRing" cx="140" cy="140" r="130"></circle>
      </svg>
      <div class="timer-display">
        <div class="time" id="timeDisplay">25:00</div>
        <div class="session-count" id="sessionCount">Session 1 of 4</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-icon" id="settingsBtn" aria-label="Settings">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
      <button class="btn-primary" id="startBtn">Start</button>
      <button class="btn-secondary" id="resetBtn">Reset</button>
    </div>

    <div class="settings" id="settingsPanel">
      <h2>⚙️ Settings</h2>
      <div class="setting-row">
        <label for="workDuration">Work (minutes)</label>
        <input type="number" id="workDuration" value="25" min="1" max="60">
      </div>
      <div class="setting-row">
        <label for="shortBreak">Short Break (minutes)</label>
        <input type="number" id="shortBreak" value="5" min="1" max="30">
      </div>
      <div class="setting-row">
        <label for="longBreak">Long Break (minutes)</label>
        <input type="number" id="longBreak" value="15" min="1" max="60">
      </div>
      <div class="setting-row">
        <label for="sessionsBeforeLong">Sessions before long break</label>
        <input type="number" id="sessionsBeforeLong" value="4" min="2" max="10">
      </div>
    </div>

    <span class="badge">Generated by AI</span>
  </div>

  <script>
    // State
    let isRunning = false;
    let isBreak = false;
    let currentSession = 1;
    let timeRemaining = 25 * 60; // seconds
    let totalTime = 25 * 60;
    let intervalId = null;

    // Settings
    let workDuration = 25;
    let shortBreakDuration = 5;
    let longBreakDuration = 15;
    let sessionsBeforeLongBreak = 4;

    // DOM elements
    const timeDisplay = document.getElementById('timeDisplay');
    const sessionCount = document.getElementById('sessionCount');
    const modeIndicator = document.getElementById('modeIndicator');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const progressRing = document.getElementById('progressRing');
    const timerRing = document.getElementById('timerRing');

    // Progress ring setup
    const radius = 130;
    const circumference = 2 * Math.PI * radius;
    progressRing.style.strokeDasharray = circumference;
    progressRing.style.strokeDashoffset = 0;

    // Audio context for notifications
    let audioContext;

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playNotification() {
      initAudio();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.3);
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.5);
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(timeRemaining);
      sessionCount.textContent = `Session ${currentSession} of ${sessionsBeforeLongBreak}`;
      
      // Update progress ring
      const progress = timeRemaining / totalTime;
      const offset = circumference * progress;
      progressRing.style.strokeDashoffset = circumference - offset;
      
      // Update page title
      document.title = `${formatTime(timeRemaining)} - ${isBreak ? 'Break' : 'Focus'} | Pomodoro`;
    }

    function updateMode() {
      if (isBreak) {
        modeIndicator.textContent = currentSession > sessionsBeforeLongBreak ? 'Long Break' : 'Short Break';
        timerRing.classList.add('break');
        document.documentElement.style.setProperty('--primary', '#22c55e');
      } else {
        modeIndicator.textContent = 'Focus Time';
        timerRing.classList.remove('break');
        document.documentElement.style.setProperty('--primary', '#ef4444');
      }
    }

    function startTimer() {
      if (isRunning) {
        // Pause
        clearInterval(intervalId);
        isRunning = false;
        startBtn.textContent = 'Resume';
      } else {
        // Start/Resume
        initAudio();
        isRunning = true;
        startBtn.textContent = 'Pause';
        
        intervalId = setInterval(() => {
          timeRemaining--;
          updateDisplay();
          
          if (timeRemaining <= 0) {
            clearInterval(intervalId);
            playNotification();
            
            if (isBreak) {
              // End of break, start new work session
              isBreak = false;
              if (currentSession > sessionsBeforeLongBreak) {
                currentSession = 1;
              }
              totalTime = workDuration * 60;
              timeRemaining = totalTime;
            } else {
              // End of work session
              currentSession++;
              isBreak = true;
              
              if (currentSession > sessionsBeforeLongBreak) {
                totalTime = longBreakDuration * 60;
              } else {
                totalTime = shortBreakDuration * 60;
              }
              timeRemaining = totalTime;
            }
            
            updateMode();
            updateDisplay();
            isRunning = false;
            startBtn.textContent = 'Start';
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(intervalId);
      isRunning = false;
      isBreak = false;
      currentSession = 1;
      
      totalTime = workDuration * 60;
      timeRemaining = totalTime;
      
      startBtn.textContent = 'Start';
      updateMode();
      updateDisplay();
    }

    function loadSettings() {
      workDuration = parseInt(document.getElementById('workDuration').value) || 25;
      shortBreakDuration = parseInt(document.getElementById('shortBreak').value) || 5;
      longBreakDuration = parseInt(document.getElementById('longBreak').value) || 15;
      sessionsBeforeLongBreak = parseInt(document.getElementById('sessionsBeforeLong').value) || 4;
    }

    // Event listeners
    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);
    
    settingsBtn.addEventListener('click', () => {
      settingsPanel.classList.toggle('open');
    });

    document.querySelectorAll('.settings input').forEach(input => {
      input.addEventListener('change', () => {
        loadSettings();
        if (!isRunning && !isBreak) {
          totalTime = workDuration * 60;
          timeRemaining = totalTime;
          updateDisplay();
        }
      });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
        e.preventDefault();
        startTimer();
      } else if (e.code === 'KeyR' && e.target.tagName !== 'INPUT') {
        resetTimer();
      }
    });

    // Initialize
    updateDisplay();
    updateMode();
  </script>
</body>
</html>
