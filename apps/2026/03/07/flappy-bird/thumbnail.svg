<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="70%" style="stop-color:#70c5ce"/>
      <stop offset="100%" style="stop-color:#8b5a2b"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e8b57"/>
      <stop offset="20%" style="stop-color:#90ee90"/>
      <stop offset="50%" style="stop-color:#3cb371"/>
      <stop offset="100%" style="stop-color:#2e8b57"/>
    </linearGradient>
  </defs>
  
  <!-- Sky background -->
  <rect width="400" height="300" fill="url(#sky)"/>
  
  <!-- Clouds -->
  <ellipse cx="60" cy="50" rx="40" ry="20" fill="rgba(255,255,255,0.8)"/>
  <ellipse cx="90" cy="45" rx="30" ry="18" fill="rgba(255,255,255,0.9)"/>
  <ellipse cx="320" cy="70" rx="35" ry="18" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="280" cy="35" rx="25" ry="15" fill="rgba(255,255,255,0.8)"/>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#8b5a2b"/>
  <rect x="0" y="245" width="400" height="8" fill="#7cfc00"/>
  
  <!-- Left pipe (top) -->
  <rect x="80" y="0" width="50" height="100" fill="url(#pipe)"/>
  <rect x="72" y="90" width="66" height="25" fill="#2e8b57" rx="3"/>
  
  <!-- Left pipe (bottom) -->
  <rect x="80" y="180" width="50" height="70" fill="url(#pipe)"/>
  <rect x="72" y="180" width="66" height="25" fill="#2e8b57" rx="3"/>
  
  <!-- Right pipe (top) -->
  <rect x="250" y="0" width="50" height="60" fill="url(#pipe)"/>
  <rect x="242" y="50" width="66" height="25" fill="#2e8b57" rx="3"/>
  
  <!-- Right pipe (bottom) -->
  <rect x="250" y="140" width="50" height="110" fill="url(#pipe)"/>
  <rect x="242" y="140" width="66" height="25" fill="#2e8b57" rx="3"/>
  
  <!-- Bird body -->
  <ellipse cx="170" cy="130" rx="22" ry="18" fill="#ffd700"/>
  
  <!-- Bird wing -->
  <ellipse cx="162" cy="135" rx="12" ry="8" fill="#daa520" transform="rotate(-15 162 135)"/>
  
  <!-- Bird eye (white) -->
  <circle cx="182" cy="124" r="8" fill="white"/>
  
  <!-- Bird eye (pupil) -->
  <circle cx="185" cy="123" r="4" fill="black"/>
  
  <!-- Bird beak -->
  <polygon points="195,130 212,135 195,142" fill="#ff6347"/>
  
  <!-- Score display -->
  <text x="200" y="40" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="bold" fill="white" stroke="black" stroke-width="2">5</text>
  
  <!-- Title at bottom -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">FLAPPY BIRD</text>
</svg>
