<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#161d2f"/><stop offset="1" stop-color="#0b0f1a"/></linearGradient></defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="70" y="24" width="660" height="402" rx="18" fill="#121827" stroke="#97a6ca" stroke-opacity=".25"/>
  <text x="98" y="64" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="#e8eefc">🕯️ Lantern of Hollowmere</text>
  <text x="98" y="88" font-family="system-ui,sans-serif" font-size="14" fill="#97a6ca">Parser-style text adventure — look / go / take / use / inventory / help</text>
  <rect x="98" y="106" width="604" height="248" rx="12" fill="#070b15" stroke="#97a6ca" stroke-opacity=".22"/>
  <text x="114" y="132" font-family="ui-monospace,monospace" font-size="14" fill="#e8eefc">&gt; look</text>
  <text x="114" y="156" font-family="ui-monospace,monospace" font-size="14" fill="#e8eefc">== Moon Arch ==</text>
  <text x="114" y="180" font-family="ui-monospace,monospace" font-size="14" fill="#e8eefc">A cracked stone arch frames two routes...</text>
  <text x="114" y="204" font-family="ui-monospace,monospace" font-size="14" fill="#e8eefc">Exits: west, east, north</text>
  <text x="114" y="238" font-family="ui-monospace,monospace" font-size="14" fill="#e8eefc">&gt; use key gate</text>
  <text x="114" y="262" font-family="ui-monospace,monospace" font-size="14" fill="#34d399">You unlock the iron gate.</text>
  <text x="114" y="294" font-family="ui-monospace,monospace" font-size="14" fill="#e8eefc">&gt; go north</text>
  <text x="114" y="318" font-family="ui-monospace,monospace" font-size="14" fill="#e8eefc">== Bell Tower Yard ==</text>
  <rect x="98" y="368" width="430" height="36" rx="18" fill="#1a2238" stroke="#97a6ca" stroke-opacity=".24"/>
  <text x="116" y="391" font-family="ui-monospace,monospace" font-size="13" fill="#97a6ca">Type command...   look / go north / take key / inventory / help</text>
  <rect x="540" y="368" width="162" height="36" rx="18" fill="#7c3aed"/>
  <text x="621" y="391" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="white">Enter</text>
</svg>
