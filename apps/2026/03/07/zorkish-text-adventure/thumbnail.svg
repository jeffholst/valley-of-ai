<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#161d2f"/><stop offset="1" stop-color="#0b0f1a"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="70" y="24" width="660" height="402" rx="18" fill="#121827" stroke="#33ff33" stroke-opacity=".25"/>
  <text x="98" y="64" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="#33ff33">🕯️ Lantern of Hollowmere</text>
  <text x="98" y="88" font-family="system-ui,sans-serif" font-size="14" fill="#22bb22">Parser-style text adventure — look / go / take / use / inventory / help</text>
  <rect x="98" y="106" width="604" height="248" rx="12" fill="#070b15" stroke="#33ff33" stroke-opacity=".22"/>
  <text x="114" y="132" font-family="ui-monospace,monospace" font-size="14" fill="#33ff33" filter="url(#glow)">&gt; look</text>
  <text x="114" y="156" font-family="ui-monospace,monospace" font-size="14" fill="#33ff33" filter="url(#glow)">== Moon Arch ==</text>
  <text x="114" y="180" font-family="ui-monospace,monospace" font-size="14" fill="#33ff33" filter="url(#glow)">A cracked stone arch frames two routes...</text>
  <text x="114" y="204" font-family="ui-monospace,monospace" font-size="14" fill="#33ff33" filter="url(#glow)">Exits: west, east, north</text>
  <text x="114" y="238" font-family="ui-monospace,monospace" font-size="14" fill="#33ff33" filter="url(#glow)">&gt; use key gate</text>
  <text x="114" y="262" font-family="ui-monospace,monospace" font-size="14" fill="#66ff66" filter="url(#glow)">You unlock the iron gate.</text>
  <text x="114" y="294" font-family="ui-monospace,monospace" font-size="14" fill="#33ff33" filter="url(#glow)">&gt; go north</text>
  <text x="114" y="318" font-family="ui-monospace,monospace" font-size="14" fill="#33ff33" filter="url(#glow)">== Bell Tower Yard ==</text>
  <rect x="98" y="368" width="430" height="36" rx="18" fill="#0a1a0a" stroke="#33ff33" stroke-opacity=".24"/>
  <text x="116" y="391" font-family="ui-monospace,monospace" font-size="13" fill="#22aa22">Type command...   look / go north / take key / inventory / help</text>
  <rect x="540" y="368" width="162" height="36" rx="18" fill="#1a5c1a"/>
  <text x="621" y="391" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#33ff33">Enter</text>
</svg>
