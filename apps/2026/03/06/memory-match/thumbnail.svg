<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  
  <!-- Grid of cards -->
  <!-- Row 1 -->
  <rect x="60" y="60" width="60" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="90" y="100" font-size="28" text-anchor="middle" dominant-baseline="middle">?</text>
  
  <rect x="130" y="60" width="60" height="60" rx="8" fill="url(#cardGrad)" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
  <text x="160" y="100" font-size="28" text-anchor="middle" dominant-baseline="middle">🚀</text>
  
  <rect x="200" y="60" width="60" height="60" rx="8" fill="url(#cardGrad)" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
  <text x="230" y="100" font-size="28" text-anchor="middle" dominant-baseline="middle">🚀</text>
  
  <rect x="270" y="60" width="60" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="300" y="100" font-size="28" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8">?</text>
  
  <!-- Row 2 -->
  <rect x="60" y="130" width="60" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="90" y="170" font-size="28" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8">?</text>
  
  <rect x="130" y="130" width="60" height="60" rx="8" fill="#10b981" stroke="#34d399" stroke-width="2" filter="url(#glow)"/>
  <text x="160" y="170" font-size="28" text-anchor="middle" dominant-baseline="middle">🎨</text>
  
  <rect x="200" y="130" width="60" height="60" rx="8" fill="#10b981" stroke="#34d399" stroke-width="2" filter="url(#glow)"/>
  <text x="230" y="170" font-size="28" text-anchor="middle" dominant-baseline="middle">🎨</text>
  
  <rect x="270" y="130" width="60" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="300" y="170" font-size="28" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8">?</text>
  
  <!-- Row 3 -->
  <rect x="60" y="200" width="60" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="90" y="240" font-size="28" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8">?</text>
  
  <rect x="130" y="200" width="60" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="160" y="240" font-size="28" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8">?</text>
  
  <rect x="200" y="200" width="60" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="230" y="240" font-size="28" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8">?</text>
  
  <rect x="270" y="200" width="60" height="60" rx="8" fill="#334155" stroke="#475569" stroke-width="2"/>
  <text x="300" y="240" font-size="28" text-anchor="middle" dominant-baseline="middle" fill="#94a3b8">?</text>
  
  <!-- Title -->
  <text x="200" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="url(#titleGrad)">Memory Match</text>
  
  <!-- Stats bar -->
  <rect x="100" y="275" width="200" height="20" rx="4" fill="#1e293b" stroke="#475569"/>
  <text x="140" y="289" font-family="system-ui" font-size="10" fill="#8b5cf6">Moves: 5</text>
  <text x="210" y="289" font-family="system-ui" font-size="10" fill="#8b5cf6">Time: 0:42</text>
</svg>
