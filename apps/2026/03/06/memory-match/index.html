<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match</title>
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #334155;
      --bg-card-front: #3b82f6;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --success: #10b981;
      --border: #475569;
    }

    .light-mode {
      --bg-primary: #f1f5f9;
      --bg-secondary: #e2e8f0;
      --bg-card: #cbd5e1;
      --bg-card-front: #3b82f6;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --accent: #7c3aed;
      --accent-glow: rgba(124, 58, 237, 0.3);
      --success: #059669;
      --border: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 600px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .theme-toggle {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, background 0.3s;
    }

    .theme-toggle:hover {
      transform: scale(1.1);
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty-btn {
      padding: 10px 20px;
      border: 2px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .difficulty-btn:hover {
      border-color: var(--accent);
    }

    .difficulty-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .stats {
      display: flex;
      gap: 30px;
      margin-bottom: 20px;
      background: var(--bg-secondary);
      padding: 15px 30px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .game-board {
      display: grid;
      gap: 10px;
      perspective: 1000px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 20px;
    }

    .game-board.easy {
      grid-template-columns: repeat(4, 1fr);
    }

    .game-board.medium {
      grid-template-columns: repeat(4, 1fr);
    }

    .game-board.hard {
      grid-template-columns: repeat(5, 1fr);
    }

    .card {
      aspect-ratio: 1;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s;
      cursor: pointer;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card.matched {
      cursor: default;
    }

    .card.matched .card-front {
      background: var(--success);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 2px solid var(--border);
      transition: box-shadow 0.3s;
    }

    .card-back {
      background: var(--bg-card);
    }

    .card-back::after {
      content: '?';
      font-size: 2rem;
      color: var(--text-secondary);
      font-weight: bold;
    }

    .card:hover .card-back {
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .card-front {
      background: var(--bg-card-front);
      transform: rotateY(180deg);
    }

    .card:active {
      transform: scale(0.95);
    }

    .card.flipped:active {
      transform: rotateY(180deg) scale(0.95);
    }

    .restart-btn {
      padding: 12px 30px;
      background: linear-gradient(135deg, var(--accent) 0%, #ec4899 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px var(--accent-glow);
    }

    .victory-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .victory-overlay.show {
      display: flex;
    }

    .victory-modal {
      background: var(--bg-secondary);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      border: 2px solid var(--accent);
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .victory-emoji {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .victory-title {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .victory-stats {
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 101;
    }

    @media (max-width: 500px) {
      .game-board {
        gap: 6px;
      }

      .card-face {
        font-size: 1.5rem;
        border-radius: 8px;
      }

      .card-back::after {
        font-size: 1.5rem;
      }

      h1 {
        font-size: 1.4rem;
      }

      .stats {
        gap: 20px;
        padding: 12px 20px;
      }

      .stat-value {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 Memory Match</h1>
    <button class="theme-toggle" id="themeToggle">🌙</button>
  </div>

  <div class="controls">
    <button class="difficulty-btn active" data-difficulty="easy">Easy (12)</button>
    <button class="difficulty-btn" data-difficulty="medium">Medium (16)</button>
    <button class="difficulty-btn" data-difficulty="hard">Hard (20)</button>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-value" id="moves">0</span>
      <span class="stat-label">Moves</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="matches">0</span>
      <span class="stat-label">Matches</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="timer">0:00</span>
      <span class="stat-label">Time</span>
    </div>
  </div>

  <div class="game-board easy" id="gameBoard"></div>

  <button class="restart-btn" id="restartBtn">🔄 New Game</button>

  <div class="victory-overlay" id="victoryOverlay">
    <div class="victory-modal">
      <div class="victory-emoji">🎉</div>
      <h2 class="victory-title">You Won!</h2>
      <p class="victory-stats" id="victoryStats">Completed in 0 moves and 0:00</p>
      <button class="restart-btn" id="playAgainBtn">🎮 Play Again</button>
    </div>
  </div>

  <script>
    const EMOJIS = ['🚀', '🎨', '🎸', '🌈', '🦄', '🍕', '🎯', '💎', '🌸', '🔥'];
    
    const DIFFICULTIES = {
      easy: { pairs: 6, cols: 4 },
      medium: { pairs: 8, cols: 4 },
      hard: { pairs: 10, cols: 5 }
    };

    let currentDifficulty = 'easy';
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let totalPairs = 6;
    let lockBoard = false;
    let timerInterval = null;
    let seconds = 0;
    let gameStarted = false;

    const gameBoard = document.getElementById('gameBoard');
    const movesDisplay = document.getElementById('moves');
    const matchesDisplay = document.getElementById('matches');
    const timerDisplay = document.getElementById('timer');
    const restartBtn = document.getElementById('restartBtn');
    const victoryOverlay = document.getElementById('victoryOverlay');
    const victoryStats = document.getElementById('victoryStats');
    const playAgainBtn = document.getElementById('playAgainBtn');
    const themeToggle = document.getElementById('themeToggle');
    const difficultyBtns = document.querySelectorAll('.difficulty-btn');

    function createCards() {
      const { pairs } = DIFFICULTIES[currentDifficulty];
      totalPairs = pairs;
      const selectedEmojis = EMOJIS.slice(0, pairs);
      const cardValues = [...selectedEmojis, ...selectedEmojis];
      
      // Shuffle cards
      for (let i = cardValues.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cardValues[i], cardValues[j]] = [cardValues[j], cardValues[i]];
      }

      cards = cardValues;
      renderCards();
    }

    function renderCards() {
      gameBoard.innerHTML = '';
      gameBoard.className = `game-board ${currentDifficulty}`;

      cards.forEach((emoji, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;
        card.dataset.value = emoji;
        
        card.innerHTML = `
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${emoji}</div>
        `;
        
        card.addEventListener('click', () => flipCard(card));
        gameBoard.appendChild(card);
      });
    }

    function flipCard(card) {
      if (lockBoard) return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;

      if (!gameStarted) {
        startTimer();
        gameStarted = true;
      }

      card.classList.add('flipped');
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        moves++;
        movesDisplay.textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      lockBoard = true;
      const [card1, card2] = flippedCards;

      if (card1.dataset.value === card2.dataset.value) {
        card1.classList.add('matched');
        card2.classList.add('matched');
        matchedPairs++;
        matchesDisplay.textContent = matchedPairs;
        flippedCards = [];
        lockBoard = false;

        if (matchedPairs === totalPairs) {
          setTimeout(showVictory, 500);
        }
      } else {
        setTimeout(() => {
          card1.classList.remove('flipped');
          card2.classList.remove('flipped');
          flippedCards = [];
          lockBoard = false;
        }, 1000);
      }
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        timerDisplay.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    function resetGame() {
      stopTimer();
      flippedCards = [];
      matchedPairs = 0;
      moves = 0;
      seconds = 0;
      lockBoard = false;
      gameStarted = false;
      
      movesDisplay.textContent = '0';
      matchesDisplay.textContent = '0';
      timerDisplay.textContent = '0:00';
      victoryOverlay.classList.remove('show');
      
      createCards();
    }

    function showVictory() {
      stopTimer();
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      victoryStats.textContent = `Completed in ${moves} moves and ${mins}:${secs.toString().padStart(2, '0')}`;
      victoryOverlay.classList.add('show');
      createConfetti();
    }

    function createConfetti() {
      const colors = ['#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#3b82f6'];
      
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = '-10px';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(confetti);

        const duration = 2000 + Math.random() * 2000;
        const animation = confetti.animate([
          { top: '-10px', opacity: 1 },
          { top: '100vh', opacity: 0 }
        ], {
          duration,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        });

        animation.onfinish = () => confetti.remove();
      }
    }

    function setDifficulty(difficulty) {
      currentDifficulty = difficulty;
      difficultyBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.difficulty === difficulty);
      });
      resetGame();
    }

    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      themeToggle.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
    }

    // Event Listeners
    restartBtn.addEventListener('click', resetGame);
    playAgainBtn.addEventListener('click', resetGame);
    themeToggle.addEventListener('click', toggleTheme);
    difficultyBtns.forEach(btn => {
      btn.addEventListener('click', () => setDifficulty(btn.dataset.difficulty));
    });

    // Initialize
    createCards();
  </script>
</body>
</html>
