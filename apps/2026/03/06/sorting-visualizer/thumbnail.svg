<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>
  
  <!-- Header -->
  <text x="400" y="45" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="700" fill="url(#titleGrad)">🔀 Sorting Algorithm Visualizer</text>
  <text x="400" y="70" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="14" fill="#94a3b8">Watch algorithms sort data in real-time</text>
  
  <!-- Controls bar -->
  <rect x="40" y="90" width="720" height="50" rx="12" fill="#1e293b"/>
  
  <!-- Control buttons -->
  <rect x="60" y="103" width="120" height="24" rx="6" fill="#334155"/>
  <text x="120" y="120" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#f1f5f9">Bubble Sort ▼</text>
  
  <rect x="200" y="103" width="80" height="24" rx="6" fill="#334155"/>
  <text x="240" y="120" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#f1f5f9">Size: 50</text>
  
  <rect x="300" y="103" width="80" height="24" rx="6" fill="#334155"/>
  <text x="340" y="120" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#f1f5f9">Speed: 50</text>
  
  <rect x="560" y="103" width="80" height="24" rx="6" fill="#3b82f6"/>
  <text x="600" y="120" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#f1f5f9">▶️ Start</text>
  
  <rect x="660" y="103" width="80" height="24" rx="6" fill="#334155"/>
  <text x="700" y="120" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#94a3b8">⏹️ Stop</text>
  
  <!-- Visualizer area -->
  <rect x="40" y="155" width="720" height="180" rx="12" fill="#1e293b"/>
  
  <!-- Sorting bars (showing mid-sort state) -->
  <!-- Bar heights represent values, some comparing, some sorted -->
  <rect x="60" y="280" width="12" height="40" rx="2" fill="#10b981"/>
  <rect x="78" y="260" width="12" height="60" rx="2" fill="#10b981"/>
  <rect x="96" y="295" width="12" height="25" rx="2" fill="#10b981"/>
  <rect x="114" y="250" width="12" height="70" rx="2" fill="#10b981"/>
  <rect x="132" y="270" width="12" height="50" rx="2" fill="#10b981"/>
  <rect x="150" y="240" width="12" height="80" rx="2" fill="#10b981"/>
  <rect x="168" y="285" width="12" height="35" rx="2" fill="#10b981"/>
  <rect x="186" y="225" width="12" height="95" rx="2" fill="#10b981"/>
  <rect x="204" y="255" width="12" height="65" rx="2" fill="#10b981"/>
  <rect x="222" y="210" width="12" height="110" rx="2" fill="#10b981"/>
  
  <!-- Comparing bars (yellow) -->
  <rect x="240" y="235" width="12" height="85" rx="2" fill="#f59e0b"/>
  <rect x="258" y="195" width="12" height="125" rx="2" fill="#f59e0b"/>
  
  <!-- Unsorted bars -->
  <rect x="276" y="220" width="12" height="100" rx="2" fill="#64748b"/>
  <rect x="294" y="175" width="12" height="145" rx="2" fill="#64748b"/>
  <rect x="312" y="200" width="12" height="120" rx="2" fill="#64748b"/>
  <rect x="330" y="245" width="12" height="75" rx="2" fill="#64748b"/>
  <rect x="348" y="185" width="12" height="135" rx="2" fill="#64748b"/>
  <rect x="366" y="265" width="12" height="55" rx="2" fill="#64748b"/>
  <rect x="384" y="230" width="12" height="90" rx="2" fill="#64748b"/>
  <rect x="402" y="170" width="12" height="150" rx="2" fill="#64748b"/>
  <rect x="420" y="210" width="12" height="110" rx="2" fill="#64748b"/>
  
  <!-- Swapping bars (red) -->
  <rect x="438" y="190" width="12" height="130" rx="2" fill="#ef4444"/>
  <rect x="456" y="250" width="12" height="70" rx="2" fill="#ef4444"/>
  
  <!-- More unsorted -->
  <rect x="474" y="215" width="12" height="105" rx="2" fill="#64748b"/>
  <rect x="492" y="180" width="12" height="140" rx="2" fill="#64748b"/>
  <rect x="510" y="240" width="12" height="80" rx="2" fill="#64748b"/>
  <rect x="528" y="195" width="12" height="125" rx="2" fill="#64748b"/>
  <rect x="546" y="275" width="12" height="45" rx="2" fill="#64748b"/>
  <rect x="564" y="225" width="12" height="95" rx="2" fill="#64748b"/>
  <rect x="582" y="205" width="12" height="115" rx="2" fill="#64748b"/>
  <rect x="600" y="165" width="12" height="155" rx="2" fill="#64748b"/>
  
  <!-- Pivot bar (purple) -->
  <rect x="618" y="188" width="12" height="132" rx="2" fill="#8b5cf6"/>
  
  <!-- More unsorted -->
  <rect x="636" y="235" width="12" height="85" rx="2" fill="#64748b"/>
  <rect x="654" y="260" width="12" height="60" rx="2" fill="#64748b"/>
  <rect x="672" y="200" width="12" height="120" rx="2" fill="#64748b"/>
  <rect x="690" y="280" width="12" height="40" rx="2" fill="#64748b"/>
  <rect x="708" y="245" width="12" height="75" rx="2" fill="#64748b"/>
  <rect x="726" y="270" width="12" height="50" rx="2" fill="#64748b"/>
  
  <!-- Legend -->
  <rect x="180" y="350" width="12" height="12" rx="2" fill="#64748b"/>
  <text x="198" y="360" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#94a3b8">Unsorted</text>
  
  <rect x="280" y="350" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="298" y="360" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#94a3b8">Comparing</text>
  
  <rect x="390" y="350" width="12" height="12" rx="2" fill="#ef4444"/>
  <text x="408" y="360" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#94a3b8">Swapping</text>
  
  <rect x="490" y="350" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="508" y="360" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#94a3b8">Pivot</text>
  
  <rect x="570" y="350" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="588" y="360" font-family="Segoe UI, system-ui, sans-serif" font-size="11" fill="#94a3b8">Sorted</text>
  
  <!-- Stats bar -->
  <rect x="40" y="380" width="720" height="55" rx="12" fill="#1e293b"/>
  
  <!-- Stats -->
  <text x="130" y="405" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#3b82f6">1,247</text>
  <text x="130" y="422" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#94a3b8">COMPARISONS</text>
  
  <text x="290" y="405" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#3b82f6">523</text>
  <text x="290" y="422" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#94a3b8">SWAPS</text>
  
  <text x="450" y="405" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#3b82f6">2.45s</text>
  <text x="450" y="422" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#94a3b8">TIME</text>
  
  <text x="610" y="405" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="20" font-weight="700" fill="#f59e0b">Sorting...</text>
  <text x="610" y="422" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#94a3b8">STATUS</text>
</svg>
