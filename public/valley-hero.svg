<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="mountainGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="mountainGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="mountainGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sky background -->
  <rect width="800" height="300" fill="url(#skyGrad)"/>
  
  <!-- Stars -->
  <g fill="white" filter="url(#starGlow)">
    <circle cx="50" cy="30" r="1.5" opacity="0.9"/>
    <circle cx="120" cy="50" r="1" opacity="0.7"/>
    <circle cx="200" cy="25" r="1.2" opacity="0.8"/>
    <circle cx="280" cy="60" r="0.8" opacity="0.6"/>
    <circle cx="350" cy="35" r="1.5" opacity="0.9"/>
    <circle cx="420" cy="55" r="1" opacity="0.7"/>
    <circle cx="500" cy="20" r="1.3" opacity="0.85"/>
    <circle cx="580" cy="45" r="0.9" opacity="0.65"/>
    <circle cx="650" cy="30" r="1.4" opacity="0.88"/>
    <circle cx="720" cy="55" r="1.1" opacity="0.75"/>
    <circle cx="770" cy="25" r="1" opacity="0.7"/>
    <circle cx="90" cy="80" r="0.8" opacity="0.5"/>
    <circle cx="450" cy="75" r="0.7" opacity="0.55"/>
    <circle cx="600" cy="70" r="0.9" opacity="0.6"/>
  </g>
  
  <!-- Distant mountains -->
  <path d="M0 200 L100 140 L200 180 L300 120 L400 160 L500 100 L600 150 L700 110 L800 170 L800 300 L0 300 Z" fill="url(#mountainGrad1)" opacity="0.6"/>
  
  <!-- Middle mountains -->
  <path d="M0 220 L80 170 L160 200 L240 150 L320 190 L400 130 L480 180 L560 140 L640 175 L720 135 L800 190 L800 300 L0 300 Z" fill="url(#mountainGrad2)" opacity="0.8"/>
  
  <!-- Foreground mountains -->
  <path d="M0 250 L100 200 L180 230 L280 180 L380 220 L450 170 L520 210 L620 165 L700 200 L800 180 L800 300 L0 300 Z" fill="url(#mountainGrad3)"/>
  
  <!-- Valley glow -->
  <ellipse cx="400" cy="300" rx="300" ry="80" fill="url(#glowGrad)" opacity="0.5"/>
  
  <!-- AI particles/orbs -->
  <g filter="url(#glow)">
    <circle cx="200" cy="160" r="4" fill="#f472b6" opacity="0.8">
      <animate attributeName="cy" values="160;155;160" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="130" r="3" fill="#a78bfa" opacity="0.7">
      <animate attributeName="cy" values="130;125;130" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="145" r="5" fill="#60a5fa" opacity="0.9">
      <animate attributeName="cy" values="145;138;145" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="170" r="3.5" fill="#34d399" opacity="0.75">
      <animate attributeName="cy" values="170;164;170" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="190" r="2.5" fill="#fbbf24" opacity="0.7">
      <animate attributeName="cy" values="190;185;190" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="150" r="3" fill="#f87171" opacity="0.75">
      <animate attributeName="cy" values="150;145;150" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Connection lines between orbs -->
  <g stroke="white" stroke-width="0.5" opacity="0.15">
    <line x1="200" y1="160" x2="350" y2="130"/>
    <line x1="350" y1="130" x2="500" y2="145"/>
    <line x1="500" y1="145" x2="600" y2="170"/>
    <line x1="150" y1="190" x2="200" y2="160"/>
    <line x1="600" y1="170" x2="650" y2="150"/>
  </g>
  
  <!-- Central bright star -->
  <g transform="translate(400, 80)" filter="url(#starGlow)">
    <circle r="3" fill="white"/>
    <circle r="8" fill="white" opacity="0.3"/>
    <line x1="-15" y1="0" x2="15" y2="0" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="white" stroke-width="1" opacity="0.5"/>
  </g>
</svg>